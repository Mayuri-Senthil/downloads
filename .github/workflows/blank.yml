name: Download Nuitka Wheels (Python 3.13)

on:
  workflow_dispatch:
    inputs:
      python_version:
        description: "Python 3.13.x patch version"
        required: false
        default: "3.13.3"
      extra_packages:
        description: "Extra pip packages to download (space-separated, e.g. numpy pandas)"
        required: false
        default: ""
      requirements_file:
        description: "Path to requirements.txt (leave blank if none)"
        required: false
        default: ""

jobs:
  download-wheels:
    runs-on: windows-latest  # Build on Windows for Windows-compatible wheels

    steps:
      # ── 1. Setup Python 3.13 ─────────────────────────────────────────────
      - name: Set up Python ${{ github.event.inputs.python_version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ github.event.inputs.python_version }}

      # ── 2. Verify Python version ──────────────────────────────────────────
      - name: Verify Python version
        run: python --version

      # ── 3. Upgrade pip ───────────────────────────────────────────────────
      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      # ── 4. Download Nuitka + all its dependencies ─────────────────────────
      - name: Download Nuitka wheels
        run: |
          python -m pip download nuitka `
            --dest wheels/ `
            --python-version ${{ github.event.inputs.python_version }} `
            --platform win_amd64 `
            --only-binary=:all: `
            --abi cp313
        # Note: Some pure-python packages may not have binary wheels.
        # We fall back without --only-binary for those below.

      # ── 5. Download Nuitka (allow source fallback for pure-python pkgs) ───
      - name: Download Nuitka (with source fallback)
        run: |
          python -m pip download nuitka `
            --dest wheels/
        # This catches any pure-python deps missed by the binary-only pass

      # ── 6. Download ordered-set (Nuitka runtime dep) ─────────────────────
      - name: Download ordered-set
        run: |
          python -m pip download ordered-set `
            --dest wheels/

      # ── 7. Download extra user-specified packages ─────────────────────────
      - name: Download extra packages
        if: ${{ github.event.inputs.extra_packages != '' }}
        run: |
          $packages = "${{ github.event.inputs.extra_packages }}"
          python -m pip download $packages.Split(' ') `
            --dest wheels/ `
            --platform win_amd64 `
            --python-version ${{ github.event.inputs.python_version }} `
            --abi cp313

      # ── 8. Download from requirements.txt (if provided) ───────────────────
      - name: Checkout repo (needed if requirements.txt is in the repo)
        if: ${{ github.event.inputs.requirements_file != '' }}
        uses: actions/checkout@v4

      - name: Download requirements.txt packages
        if: ${{ github.event.inputs.requirements_file != '' }}
        run: |
          python -m pip download `
            -r ${{ github.event.inputs.requirements_file }} `
            --dest wheels/ `
            --platform win_amd64 `
            --python-version ${{ github.event.inputs.python_version }} `
            --abi cp313

      # ── 9. Download MinGW64 (C compiler Nuitka needs) ────────────────────
      - name: Download MinGW64 for Nuitka
        shell: powershell
        run: |
          $mingwUrl = "https://github.com/niXman/mingw-builds-binaries/releases/download/14.2.0-rt_v12-rev0/x86_64-14.2.0-release-posix-seh-ucrt-rt_v12-rev0.7z"
          $outFile = "mingw64.7z"
          Write-Host "Downloading MinGW64..."
          Invoke-WebRequest -Uri $mingwUrl -OutFile $outFile
          Write-Host "Download complete: $outFile"

      # ── 10. List all downloaded files ─────────────────────────────────────
      - name: List downloaded wheels
        run: |
          echo "=== Wheels downloaded ==="
          Get-ChildItem wheels/ | Select-Object Name, Length | Format-Table
          echo ""
          echo "Total files: $((Get-ChildItem wheels/).Count)"

      # ── 11. Generate install script for the air-gapped machine ───────────
      - name: Generate offline install script
        shell: powershell
        run: |
          $script = @"
          @echo off
          REM ============================================================
          REM  Offline Nuitka Installer — generated by GitHub Actions
          REM  Python ${{ github.event.inputs.python_version }} / Windows x64
          REM ============================================================

          echo [1/4] Upgrading pip...
          python -m pip install --upgrade pip --no-index --find-links=wheels\

          echo [2/4] Installing Nuitka and dependencies...
          python -m pip install nuitka --no-index --find-links=wheels\

          echo [3/4] Verifying Nuitka install...
          python -m nuitka --version

          echo [4/4] Done! You can now compile with:
          echo   python -m nuitka --onefile --mingw64 --mingw64-path=C:\mingw64 your_script.py
          pause
          "@
          $script | Out-File -FilePath "install_offline.bat" -Encoding ASCII
          Write-Host "install_offline.bat generated."

      # ── 12. Upload everything as a single artifact ────────────────────────
      - name: Upload wheels artifact
        uses: actions/upload-artifact@v4
        with:
          name: nuitka-offline-bundle-py313
          path: |
            wheels/
            mingw64.7z
            install_offline.bat
          retention-days: 30

      # ── 13. Summary ───────────────────────────────────────────────────────
      - name: Print summary
        run: |
          echo "✅ Bundle ready: nuitka-offline-bundle-py313"
          echo ""
          echo "Contents:"
          echo "  wheels/           ← all .whl files (pip install offline)"
          echo "  mingw64.7z        ← C compiler for Nuitka"
          echo "  install_offline.bat ← run this on the air-gapped machine"
          echo ""
          echo "Transfer the artifact to your air-gapped machine and run install_offline.bat"
