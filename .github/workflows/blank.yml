name: Download debs
on: [push]
jobs:
  download:
    runs-on: ubuntu-24.04
    steps:
      - name: Download all gcc deps
        run: |
          mkdir debs
          cd debs
          apt-get download gcc gcc-13 gcc-13-base cpp cpp-13 \
            gcc-x86-64-linux-gnu gcc-13-x86-64-linux-gnu \
            cpp-x86-64-linux-gnu cpp-13-x86-64-linux-gnu \
            libgcc-13-dev libgomp1 libitm1 libatomic1 \
            libasan8 liblsan0 libtsan2 libubsan1 \
            libhwasan0 libquadmath0 libc-dev-bin \
            libcrypt-dev rpcsvc-proto binutils-common \
            libbinutils binutils-x86-64-linux-gnu \
            libc6-dev linux-libc-dev make binutils
      - name: Zip debs
        run: zip -r debs.zip debs/
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: gcc-debs
          path: debs.zip
