name: Build Offline Nuitka Bundle (Windows Py3.13)

on:
workflow_dispatch:

jobs:
build-offline-bundle:
runs-on: windows-latest

```
steps:
  - name: Setup Python 3.13
    uses: actions/setup-python@v5
    with:
      python-version: "3.13"

  - name: Upgrade pip tooling
    run: python -m pip install --upgrade pip setuptools wheel

  - name: Create wheelhouse directory
    run: mkdir wheelhouse

  - name: Download Nuitka and dependencies
    run: >
      pip download nuitka ordered-set zstandard
      --dest wheelhouse
      --only-binary=:all:

  - name: Download build tools
    run: >
      pip download pip setuptools wheel
      --dest wheelhouse
      --only-binary=:all:

  - name: Create offline install script
    run: |
      echo @echo off > wheelhouse\install_offline.bat
      echo python -m pip install --no-index --find-links=wheelhouse pip setuptools wheel >> wheelhouse\install_offline.bat
      echo python -m pip install --no-index --find-links=wheelhouse nuitka >> wheelhouse\install_offline.bat

  - name: Upload artifact
    uses: actions/upload-artifact@v4
    with:
      name: nuitka-offline-bundle
      path: wheelhouse
```
