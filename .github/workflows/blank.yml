name: Download CuPy Wheels
on: [push]
jobs:
  download:
    runs-on: ubuntu-24.04
    steps:
      - name: Setup Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Download all wheels
        run: |
          mkdir wheels
          pip download cupy-cuda13x \
            --dest wheels \
            --python-version 3.13 \
            --platform linux_x86_64 \
            --only-binary=:all: \
            --no-cache-dir

      - name: Generate requirements.txt
        run: |
          ls wheels/*.whl | xargs -I {} basename {} | sed 's/-cp313.*//' | sed 's/_/==/1' | sed 's/_/-/g' > requirements.txt
          cat requirements.txt

      - name: Zip everything
        run: zip -r cupy-cuda13x-wheels.zip wheels/ requirements.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cupy-cuda13x-wheels
          path: cupy-cuda13x-wheels.zip
          retention-days: 7
